services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet-docs
    restart: unless-stopped
    ports:
      - "127.0.0.1:4321:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
